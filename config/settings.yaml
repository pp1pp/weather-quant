  bias_correction:
    chicago: 0.0
    new_york: 0.0
    shanghai: 1.67
  bucket_uncertainty_std: 1.3
  conditional_bias:
    high_cloud_adj: -0.8
    high_pressure_adj: 0.3
    low_humidity_adj: 0.2
    precipitation_adj: -0.5
    sea_breeze_adj: -0.3
  data_source_bias_std: 0.3
  kelly_cap: 0.25
  limit_order:
    bid_aggressiveness: 0.6
    min_fill_prob: 0.3
    spread_markup: 0.01
  max_concurrent_buckets: 4
  max_hours_to_settle: 36
  max_observation_weight: 0.7
  min_bucket_edge: 0.05
  min_hours_to_settle: 2
  min_prob_threshold: 0.01
  observation_blend_start_hours: 10
  per_bucket_max_amount: 25
  prob_clamp_max: 0.998
  prob_clamp_min: 0.002
  strong_bucket_edge: 0.1
  student_t_df: 30
  sum_to_one_threshold: 0.03
  sweet_spot_hours_high: 18
  sweet_spot_hours_low: 6
  total_multi_max_exposure: 80
position:
