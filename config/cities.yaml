# Multi-city configuration for Polymarket weather temperature markets.
# Each city has its own WU station, coordinates, timezone, and settlement unit.
# All markets resolve via Weather Underground historical daily max temperature.

cities:
  shanghai:
    name: Shanghai
    slug_city: shanghai
    station: Shanghai Pudong International Airport
    icao: ZSPD
    wmo: "58362"
    wu_geocode: "31.14,121.81"
    country: cn
    coordinates: [31.1434, 121.8052]
    timezone: Asia/Shanghai
    peak_temp_hour: 15.0
    unit: celsius
    resolution_url: https://www.wunderground.com/history/daily/cn/shanghai/ZSPD
    # Open-Meteo model availability: ECMWF not available for Shanghai
    models: "best_match,gfs_seamless,icon_seamless"
    # Sea breeze: east wind (45-135°) = coastal cooling
    sea_breeze_dir: [45, 135]

