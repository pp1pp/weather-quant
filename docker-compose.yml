services:
  weather-quant:
    build: .
    container_name: weather-quant
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - config/.env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
